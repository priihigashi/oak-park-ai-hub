name: Deploy Brazil RE to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'websites/higashi-imoveis/**'
      - '.github/workflows/deploy-brazil-re.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify site exists
        run: |
          if [ ! -f websites/higashi-imoveis/index.html ]; then
            echo "::error::websites/higashi-imoveis/index.html not found. Push the Brazil RE HTML before deploying."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: websites/higashi-imoveis

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
