name: Photo Compare (Ideogram / Recraft)

on:
  workflow_dispatch:
    inputs:
      source_image_url:
        description: 'Public URL of source photo'
        required: true
        type: string
      prompt:
        description: 'Edit prompt for all tools'
        required: true
        type: string
      drive_folder_id:
        description: 'Drive folder ID to upload results'
        required: true
        type: string
      run_ideogram:
        description: 'Run Ideogram V3?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_recraft:
        description: 'Run Recraft V3?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install -q requests google-auth google-api-python-client

      - name: Run Ideogram V3 + Recraft V3
        env:
          REPLICATE_API_TOKEN: ${{ secrets.PRI_OP_REPLICATE_API_KEY }}
          SHEETS_TOKEN_JSON: ${{ secrets.SHEETS_TOKEN }}
          SOURCE_URL: ${{ inputs.source_image_url }}
          PROMPT: ${{ inputs.prompt }}
          DRIVE_FOLDER_ID: ${{ inputs.drive_folder_id }}
          RUN_IDEOGRAM: ${{ inputs.run_ideogram }}
          RUN_RECRAFT: ${{ inputs.run_recraft }}
        run: |
          python3 << 'PYEOF'
          import os, requests, time, json, base64
          from pathlib import Path
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaInMemoryUpload

          REPLICATE_TOKEN = os.environ['REPLICATE_API_TOKEN']
          PROMPT         = os.environ['PROMPT']
          SOURCE_URL     = os.environ['SOURCE_URL']
          FOLDER_ID      = os.environ['DRIVE_FOLDER_ID']
          RUN_IDEOGRAM   = os.environ.get('RUN_IDEOGRAM', 'true') == 'true'
          RUN_RECRAFT    = os.environ.get('RUN_RECRAFT', 'true') == 'true'

          REPLICATE_HEADERS = {
              "Authorization": f"Bearer {REPLICATE_TOKEN}",
              "Content-Type": "application/json",
              "Prefer": "wait=60",
          }

          # ── Drive auth ────────────────────────────────────────────────────
          Path("/tmp/sheets_token.json").write_text(os.environ['SHEETS_TOKEN_JSON'])
          creds = Credentials.from_authorized_user_file("/tmp/sheets_token.json")
          drive = build("drive", "v3", credentials=creds)

          def upload_to_drive(name: str, data: bytes, mimetype: str = "image/png"):
              media = MediaInMemoryUpload(data, mimetype=mimetype, resumable=False)
              f = drive.files().create(
                  body={"name": name, "parents": [FOLDER_ID]},
                  media_body=media,
                  supportsAllDrives=True,
                  fields="id,name,webViewLink",
              ).execute()
              print(f"  ✅ Uploaded {f['name']} → {f['webViewLink']}", flush=True)
              return f

          # ── Download source photo ─────────────────────────────────────────
          print(f"Downloading source: {SOURCE_URL}", flush=True)
          r = requests.get(SOURCE_URL, timeout=60)
          r.raise_for_status()
          source_bytes = r.content
          source_b64 = base64.b64encode(source_bytes).decode()
          source_data_uri = f"data:image/jpeg;base64,{source_b64}"
          print(f"Source size: {len(source_bytes):,} bytes", flush=True)

          # ── Replicate helper ──────────────────────────────────────────────
          def replicate_run(model: str, payload: dict) -> bytes:
              """Submit prediction, poll until done, return image bytes."""
              r = requests.post(
                  f"https://api.replicate.com/v1/models/{model}/predictions",
                  headers=REPLICATE_HEADERS,
                  json=payload,
                  timeout=120,
              )
              if r.status_code == 429:
                  raise RuntimeError("Replicate 429 rate limit")
              r.raise_for_status()
              data = r.json()
              status = data.get("status")
              get_url = data.get("urls", {}).get("get")
              poll = 0
              while status in ("starting", "processing"):
                  time.sleep(5)
                  poll += 1
                  pr = requests.get(get_url, headers={"Authorization": f"Bearer {REPLICATE_TOKEN}"})
                  data = pr.json()
                  status = data.get("status")
                  print(f"  poll {poll}: {status}", flush=True)
                  if poll > 60:
                      raise RuntimeError("Replicate timeout after 5 min")
              if status != "succeeded":
                  raise RuntimeError(f"Replicate {status}: {data.get('error')}")
              output = data["output"]
              url = output[0] if isinstance(output, list) else output
              img_r = requests.get(url, timeout=120)
              img_r.raise_for_status()
              return img_r.content

          # ── IDEOGRAM V3 ───────────────────────────────────────────────────
          if RUN_IDEOGRAM:
              print("\n=== Ideogram V3 Quality ===", flush=True)
              try:
                  payload = {
                      "input": {
                          "prompt": PROMPT,
                          "image_file": source_data_uri,
                          "style_type": "Realistic",
                          "magic_prompt_option": "Off",
                          "resolution": "None",
                      }
                  }
                  img_bytes = replicate_run("ideogram-ai/ideogram-v3-quality", payload)
                  upload_to_drive("colinas_ideogram.jpg", img_bytes, "image/jpeg")
              except Exception as e:
                  print(f"  ❌ Ideogram failed: {e}", flush=True)

          # ── RECRAFT V3 ────────────────────────────────────────────────────
          if RUN_RECRAFT:
              print("\n=== Recraft V3 ===", flush=True)
              try:
                  # Recraft V3 on Replicate supports image_url for style reference
                  payload = {
                      "input": {
                          "prompt": PROMPT,
                          "style": "realistic_image",
                          "size": "1365x1024",
                          "image_url": SOURCE_URL,
                      }
                  }
                  img_bytes = replicate_run("recraft-ai/recraft-v3", payload)
                  upload_to_drive("colinas_recraft.jpg", img_bytes, "image/jpeg")
              except Exception as e:
                  print(f"  ❌ Recraft failed: {e}", flush=True)
                  print("  NOTE: Recraft V3 on Replicate is text-to-image only.", flush=True)
                  print("  Retrying Recraft without image_url (text-to-image)...", flush=True)
                  try:
                      payload_txt = {
                          "input": {
                              "prompt": PROMPT,
                              "style": "realistic_image",
                              "size": "1365x1024",
                          }
                      }
                      img_bytes = replicate_run("recraft-ai/recraft-v3", payload_txt)
                      upload_to_drive("colinas_recraft_txt2img.jpg", img_bytes, "image/jpeg")
                      print("  NOTE: Recraft ran as text-to-image (no edit capability).", flush=True)
                  except Exception as e2:
                      print(f"  ❌ Recraft text-to-image also failed: {e2}", flush=True)

          print("\nDone.", flush=True)
          PYEOF
