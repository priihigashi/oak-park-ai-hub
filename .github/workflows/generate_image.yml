name: Generate Image (inference.sh)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image prompt'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension, e.g. agent_kitchen)'
        required: true
        default: 'generated_image'
        type: string
      aspect_ratio:
        description: 'Aspect ratio'
        required: false
        default: '3:4'
        type: choice
        options:
          - '1:1'
          - '3:4'
          - '4:3'
          - '16:9'
          - '9:16'
      drive_folder_id:
        description: 'Google Drive folder ID to save image (leave blank to skip)'
        required: false
        default: '1CKWTojSg2uQmXjNnKlAaSBCTfxtSQBvH'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate image via inference.sh
        id: generate
        run: |
          echo "Generating image..."
          RESPONSE=$(curl -s -X POST "https://api.inference.sh/v1/apps/google/gemini-3-1-flash-image-preview/run" \
            -H "Authorization: Bearer ${{ secrets.PRI_OP_INFSH_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"input\": {
                \"prompt\": $(echo '${{ inputs.prompt }}' | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
                \"aspect_ratio\": \"${{ inputs.aspect_ratio }}\",
                \"resolution\": \"2K\"
              }
            }")
          echo "Response: $RESPONSE"
          
          # Extract image URL
          IMAGE_URL=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          images = d.get('output', {}).get('images', [])
          if images:
              print(images[0].get('url', ''))
          else:
              print('')
          " 2>/dev/null)
          
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "Image URL: $IMAGE_URL"

      - name: Download image
        if: steps.generate.outputs.image_url != ''
        run: |
          curl -L "${{ steps.generate.outputs.image_url }}" -o /tmp/${{ inputs.filename }}.jpg
          echo "Downloaded: $(du -k /tmp/${{ inputs.filename }}.jpg | cut -f1)KB"

      - name: Upload to Google Drive
        if: steps.generate.outputs.image_url != '' && inputs.drive_folder_id != ''
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          pip install -q google-auth google-api-python-client
          python3 << 'EOF'
          import os, json, base64
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          sa_key = json.loads(os.environ['GOOGLE_SA_KEY'])
          creds = service_account.Credentials.from_service_account_info(
              sa_key,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          drive = build('drive', 'v3', credentials=creds)

          filename = '${{ inputs.filename }}.jpg'
          folder_id = '${{ inputs.drive_folder_id }}'

          file_metadata = {
              'name': filename,
              'parents': [folder_id]
          }
          media = MediaFileUpload(f'/tmp/{filename}', mimetype='image/jpeg')
          result = drive.files().create(
              body=file_metadata,
              media_body=media,
              supportsAllDrives=True,
              fields='id,name,webViewLink'
          ).execute()

          print(f"Saved to Drive: {result['name']}")
          print(f"Link: {result['webViewLink']}")
          print(f"ID: {result['id']}")
          EOF

      - name: Summary
        run: |
          echo "## Image Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Prompt:** ${{ inputs.prompt }}" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** ${{ inputs.filename }}.jpg" >> $GITHUB_STEP_SUMMARY
          echo "- **Drive folder:** ${{ inputs.drive_folder_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image URL:** ${{ steps.generate.outputs.image_url }}" >> $GITHUB_STEP_SUMMARY
