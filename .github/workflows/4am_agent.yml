name: 4AM Content Agent

on:
  schedule:
    - cron: "0 8 * * *"   # 4 AM ET (EDT = UTC-4, Mar–Nov). Change to 0 9 * * * in winter (EST = UTC-5).
  workflow_dispatch:        # manual trigger — also activated by saying "run the 4AM agent now"

permissions:
  contents: write           # needed for pattern_learner to create skill files
  issues: write             # needed for failure notification via GitHub Issue

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-httplib2 google-api-python-client requests pytz

      - name: Run 4AM Content Agent
        env:
          APIFY_API_KEY:     ${{ secrets.APIFY_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SA_KEY:     ${{ secrets.GOOGLE_SA_KEY }}
          NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        working-directory: scripts/4am_agent
        run: python main.py

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: priscila@oakpark-construction.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ 4AM Agent ran — ${{ github.run_number }}"
          to: priscila@oakpark-construction.com
          from: "Oak Park AI <priscila@oakpark-construction.com>"
          body: |
            The 4AM content agent ran successfully.

            View the full run log in the Runs Log tab of your Ideas & Inbox spreadsheet.
            Run: https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: priscila@oakpark-construction.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ 4AM Agent FAILED — ${{ github.run_number }}"
          to: priscila@oakpark-construction.com
          from: "Oak Park AI <priscila@oakpark-construction.com>"
          body: |
            The 4AM content agent FAILED and needs attention.

            View run: https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}

            Check the Runs Log tab in Ideas & Inbox for details.

      - name: Notify failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `❌ 4AM Agent failed — ${new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York' })}`,
              body:  `The 4AM content agent failed.

[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

Check the Runs Log tab in the spreadsheet for details.`,
              labels: ["automation", "bug"],
            });
