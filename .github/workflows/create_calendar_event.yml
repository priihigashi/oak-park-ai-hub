name: Create Calendar Event (on demand)

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Event title'
        required: true
      date:
        description: 'Date (YYYY-MM-DD)'
        required: true
      start_time:
        description: 'Start time (HH:MM, 24h, ET)'
        required: true
        default: '10:00'
      end_time:
        description: 'End time (HH:MM, 24h, ET)'
        required: true
        default: '12:00'
      description:
        description: 'Event description'
        required: false
        default: ''

jobs:
  create-event:
    runs-on: ubuntu-latest
    steps:
      - name: Create Google Calendar Event
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          pip install google-auth google-auth-httplib2 google-api-python-client -q
          python3 << 'PYEOF'
          import os, json
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          token_data = json.loads(os.environ['SHEETS_TOKEN'])
          creds = Credentials(
              token=token_data.get('token'),
              refresh_token=token_data.get('refresh_token'),
              token_uri=token_data.get('token_uri', 'https://oauth2.googleapis.com/token'),
              client_id=token_data.get('client_id'),
              client_secret=token_data.get('client_secret'),
              scopes=token_data.get('scopes', [])
          )

          service = build('calendar', 'v3', credentials=creds)

          date = '${{ github.event.inputs.date }}'
          start = '${{ github.event.inputs.start_time }}'
          end = '${{ github.event.inputs.end_time }}'

          event = {
              'summary': '${{ github.event.inputs.title }}',
              'description': '${{ github.event.inputs.description }}',
              'start': {'dateTime': f'{date}T{start}:00', 'timeZone': 'America/New_York'},
              'end':   {'dateTime': f'{date}T{end}:00',   'timeZone': 'America/New_York'},
              'reminders': {'useDefault': False, 'overrides': [{'method': 'popup', 'minutes': 30}]}
          }

          result = service.events().insert(calendarId='primary', body=event).execute()
          print('Created:', result.get('summary'))
          print('Link:', result.get('htmlLink'))
          PYEOF
